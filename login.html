<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>NIFTY STRATEGIST — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Orbitron:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d1b3e;--panel:#0e1f45;--p2:#0a1628;
  --cyan:#60a5fa;--pink:#93c5fd;--yel:#fbbf24;
  --grn:#4ade80;--pur:#818cf8;--red:#f87171;
  --bc:rgba(96,165,250,.15);--bp:rgba(96,165,250,.08);
  --tx:#cce0ff;--t2:rgba(96,165,250,.75);--t3:rgba(96,165,250,.45);
}
html,body{
  background:linear-gradient(135deg,#0d1b3e 0%,#0a1628 40%,#0d2040 100%);
  color:var(--tx);
  font-family:'Space Grotesk',sans-serif;
  min-height:100vh;
  overflow:hidden;
}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:linear-gradient(rgba(96,165,250,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(96,165,250,.025) 1px,transparent 1px);
  background-size:50px 50px;}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 50% at 50% -5%,rgba(96,165,250,.1) 0%,transparent 55%),
    radial-gradient(ellipse 30% 40% at 5% 60%,rgba(96,165,250,.05) 0%,transparent 50%),
    radial-gradient(ellipse 25% 35% at 95% 40%,rgba(251,191,36,.04) 0%,transparent 50%);}

.scan{position:fixed;inset:0;z-index:998;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,20,.04) 3px,rgba(0,0,20,.04) 4px);}

.container{
  position:relative;z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
}

/* ══ LOGO AREA ══ */
.logo-area{text-align:center;margin-bottom:32px;animation:fadeDown .6s ease-out;}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:none}}

.logo-hex{
  width:72px;height:72px;margin:0 auto 16px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 35%,rgba(96,165,250,.25),rgba(10,20,50,.8));
  border:2px solid rgba(96,165,250,.4);
  display:flex;align-items:center;justify-content:center;font-size:36px;
  box-shadow:0 0 40px rgba(96,165,250,.25),inset 0 0 24px rgba(96,165,250,.06);
  animation:hexglow 3s ease-in-out infinite;
}
@keyframes hexglow{
  0%,100%{box-shadow:0 0 30px rgba(96,165,250,.2),inset 0 0 18px rgba(96,165,250,.04)}
  50%{box-shadow:0 0 50px rgba(96,165,250,.45),0 0 80px rgba(96,165,250,.12),inset 0 0 28px rgba(96,165,250,.1)}}

.logo-title{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;letter-spacing:1px;color:#e8f4ff;}
.logo-title span{color:#60a5fa;text-shadow:0 0 14px rgba(96,165,250,.5)}
.logo-sub{font-family:'Space Mono',monospace;font-size:13px;color:rgba(148,186,255,.5);letter-spacing:3px;margin-top:4px;}

/* ══ LOGIN CARD ══ */
.login-card{
  width:100%;max-width:420px;
  background:linear-gradient(135deg,rgba(13,25,56,.97),rgba(8,16,40,.98));
  border:1px solid rgba(96,165,250,.2);
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,20,.7),0 0 0 1px rgba(96,165,250,.08);
  animation:fadeUp .6s ease-out .1s both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

.card-topbar{
  height:3px;
  background:linear-gradient(90deg,var(--cyan),var(--pur),var(--cyan));
  box-shadow:0 0 12px var(--cyan);
}
.card-header{
  padding:20px 28px 0;
  font-family:'Space Mono',monospace;font-size:12px;letter-spacing:2px;
  color:rgba(160,200,255,.6);
  display:flex;justify-content:space-between;align-items:center;
}
.card-header .status{color:var(--grn);display:flex;align-items:center;gap:5px;}
.card-header .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--grn);box-shadow:0 0 8px var(--grn);animation:blink 1.4s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.08}}

.card-body{padding:24px 28px 28px;}

/* ══ TABS ══ */
.auth-tabs{display:flex;gap:0;margin-bottom:24px;border:1px solid rgba(96,165,250,.15);border-radius:4px;overflow:hidden;}
.auth-tab{
  flex:1;padding:10px;text-align:center;
  font-family:'Space Mono',monospace;font-size:12px;letter-spacing:2px;font-weight:700;
  color:rgba(160,200,255,.5);background:rgba(10,20,50,.5);
  border:none;cursor:pointer;transition:all .2s;
}
.auth-tab:hover{color:rgba(160,200,255,.8);background:rgba(96,165,250,.06);}
.auth-tab.active{color:#e8f4ff;background:rgba(96,165,250,.12);box-shadow:inset 0 -2px 0 var(--cyan);}

/* ══ INPUT FIELDS ══ */
.field{margin-bottom:16px;}
.field label{
  display:block;margin-bottom:6px;
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;
  color:rgba(160,200,255,.6);font-weight:700;
}
.field input{
  width:100%;padding:12px 14px;
  font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:500;
  color:#e8f4ff;
  background:linear-gradient(135deg,rgba(10,20,50,.8),rgba(5,10,25,.9));
  border:1px solid rgba(96,165,250,.2);border-radius:4px;
  outline:none;transition:all .2s;
  letter-spacing:.3px;
}
.field input::placeholder{color:rgba(96,165,250,.3);}
.field input:focus{
  border-color:rgba(96,165,250,.5);
  box-shadow:0 0 0 3px rgba(96,165,250,.08),0 0 20px rgba(96,165,250,.06);
}

/* ══ BUTTONS ══ */
.btn-primary{
  width:100%;padding:14px;margin-top:8px;
  font-family:'Space Mono',monospace;font-size:13px;letter-spacing:2px;font-weight:700;
  color:#0d1b3e;
  background:linear-gradient(135deg,#60a5fa,#818cf8);
  border:none;border-radius:4px;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;
}
.btn-primary:hover{
  box-shadow:0 0 30px rgba(96,165,250,.4),0 4px 16px rgba(96,165,250,.2);
  transform:translateY(-1px);
}
.btn-primary:active{transform:translateY(0);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}

.divider{
  display:flex;align-items:center;gap:12px;margin:20px 0;
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;
  color:rgba(96,165,250,.3);
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(96,165,250,.15),transparent);}

.btn-google{
  width:100%;padding:13px;
  font-family:'Space Mono',monospace;font-size:12px;letter-spacing:1px;font-weight:700;
  color:rgba(200,220,255,.9);
  background:rgba(10,20,50,.6);
  border:1px solid rgba(96,165,250,.2);border-radius:4px;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.btn-google:hover{
  border-color:rgba(96,165,250,.4);
  background:rgba(96,165,250,.06);
  box-shadow:0 0 16px rgba(96,165,250,.08);
}
.btn-google svg{width:18px;height:18px;}

/* ══ ERROR / INFO ══ */
.msg{
  margin-top:12px;padding:10px 14px;border-radius:4px;
  font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.5px;
  display:none;animation:fadeUp .3s ease-out;
}
.msg.error{display:block;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.25);color:#f87171;}
.msg.success{display:block;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.25);color:#4ade80;}
.msg.info{display:block;background:rgba(96,165,250,.08);border:1px solid rgba(96,165,250,.2);color:var(--cyan);}

/* ══ FOOTER ══ */
.login-footer{
  text-align:center;margin-top:20px;
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1.5px;
  color:rgba(96,165,250,.3);
  animation:fadeUp .6s ease-out .2s both;
}

/* ══ LOADING OVERLAY ══ */
.loading-overlay{
  display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(10,20,50,.95);
  flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.loading-overlay.active{display:flex;}
.spinner{
  width:40px;height:40px;border:3px solid rgba(96,165,250,.15);
  border-top-color:var(--cyan);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:2px;color:var(--t2);}

/* ══ RESET PASSWORD LINK ══ */
.forgot-link{
  display:block;text-align:right;margin-top:-8px;margin-bottom:12px;
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:1px;
  color:rgba(96,165,250,.5);cursor:pointer;
  text-decoration:none;transition:color .2s;
}
.forgot-link:hover{color:var(--cyan);}

@media(max-width:480px){
  .logo-title{font-size:22px;}
  .card-body{padding:20px 20px 24px;}
  .login-card{border-radius:6px;}
}
</style>
</head>
<body>
<div class="scan"></div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">AUTHENTICATING...</div>
</div>

<div class="container">
  <div class="logo-area">
    <div class="logo-hex">📊</div>
    <div class="logo-title">NIFTY <span>STRATEGIST</span></div>
    <div class="logo-sub">INDIAN STOCK MARKET</div>
  </div>

  <div class="login-card">
    <div class="card-topbar"></div>
    <div class="card-header">
      <span>AUTHENTICATION</span>
      <span class="status"><span class="dot"></span>SECURE</span>
    </div>
    <div class="card-body">

      <!-- Tabs -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">LOGIN</button>
        <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">SIGN UP</button>
      </div>

      <!-- Login Form -->
      <div id="formLogin">
        <div class="field">
          <label>EMAIL ADDRESS</label>
          <input type="email" id="loginEmail" placeholder="trader@example.com" autocomplete="email">
        </div>
        <div class="field">
          <label>PASSWORD</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
        </div>
        <a class="forgot-link" onclick="resetPassword()">FORGOT PASSWORD?</a>
        <button class="btn-primary" id="btnLogin" onclick="handleLogin()">▶ LOGIN</button>
      </div>

      <!-- Signup Form (hidden by default) -->
      <div id="formSignup" style="display:none">
        <div class="field">
          <label>DISPLAY NAME</label>
          <input type="text" id="signupName" placeholder="Your name" autocomplete="name">
        </div>
        <div class="field">
          <label>EMAIL ADDRESS</label>
          <input type="email" id="signupEmail" placeholder="trader@example.com" autocomplete="email">
        </div>
        <div class="field">
          <label>PASSWORD</label>
          <input type="password" id="signupPassword" placeholder="Min 6 characters" autocomplete="new-password">
        </div>
        <button class="btn-primary" id="btnSignup" onclick="handleSignup()">▶ CREATE ACCOUNT</button>
      </div>

      <div class="divider">OR</div>

      <button class="btn-google" onclick="handleGoogle()">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.04 10.04 0 001 12c0 1.61.39 3.14 1.07 4.49l3.77-2.4z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        CONTINUE WITH GOOGLE
      </button>

      <div class="msg" id="authMsg"></div>
    </div>
  </div>

  <div class="login-footer">NIFTY MARKETS HUB // SECURE ACCESS // v3.1</div>
</div>

<!-- Firebase SDKs (compat for simplicity) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script>
// ══ Firebase Config ══
// These are safe to be public — security is enforced by Firebase Security Rules
var firebaseConfig = {
  apiKey: "%%FIREBASE_API_KEY%%",
  authDomain: "%%FIREBASE_AUTH_DOMAIN%%",
  projectId: "%%FIREBASE_PROJECT_ID%%",
  storageBucket: "%%FIREBASE_STORAGE_BUCKET%%",
  messagingSenderId: "%%FIREBASE_MESSAGING_SENDER_ID%%",
  appId: "%%FIREBASE_APP_ID%%"
};
firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();

// ══ Check if already logged in ══
auth.onAuthStateChanged(function(user) {
  if (user) {
    showLoading('WELCOME BACK, ' + (user.displayName || user.email).toUpperCase() + '...');
    setTimeout(function() { window.location.href = './index.html'; }, 800);
  }
});

// ══ Tab Switching ══
function switchTab(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
  document.getElementById('formLogin').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('formSignup').style.display = tab === 'signup' ? 'block' : 'none';
  clearMsg();
}

// ══ Messages ══
function showMsg(text, type) {
  var el = document.getElementById('authMsg');
  el.className = 'msg ' + type;
  el.textContent = text;
}
function clearMsg() { document.getElementById('authMsg').className = 'msg'; document.getElementById('authMsg').textContent = ''; }
function showLoading(text) {
  var overlay = document.getElementById('loadingOverlay');
  overlay.querySelector('.loading-text').textContent = text || 'AUTHENTICATING...';
  overlay.classList.add('active');
}
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }

// ══ Email/Password Login ══
function handleLogin() {
  var email = document.getElementById('loginEmail').value.trim();
  var password = document.getElementById('loginPassword').value;
  if (!email || !password) { showMsg('Please fill in all fields.', 'error'); return; }

  document.getElementById('btnLogin').disabled = true;
  showLoading('VERIFYING CREDENTIALS...');

  auth.signInWithEmailAndPassword(email, password)
    .then(function(cred) {
      showLoading('ACCESS GRANTED — LOADING HUB...');
      setTimeout(function() { window.location.href = './index.html'; }, 600);
    })
    .catch(function(err) {
      hideLoading();
      document.getElementById('btnLogin').disabled = false;
      var msg = 'Login failed.';
      if (err.code === 'auth/user-not-found' || err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') msg = 'Invalid email or password.';
      else if (err.code === 'auth/too-many-requests') msg = 'Too many attempts. Try again later.';
      showMsg(msg, 'error');
    });
}

// ══ Email/Password Sign Up ══
function handleSignup() {
  var name = document.getElementById('signupName').value.trim();
  var email = document.getElementById('signupEmail').value.trim();
  var password = document.getElementById('signupPassword').value;
  if (!name || !email || !password) { showMsg('Please fill in all fields.', 'error'); return; }
  if (password.length < 6) { showMsg('Password must be at least 6 characters.', 'error'); return; }

  document.getElementById('btnSignup').disabled = true;
  showLoading('CREATING ACCOUNT...');

  auth.createUserWithEmailAndPassword(email, password)
    .then(function(cred) {
      return cred.user.updateProfile({ displayName: name });
    })
    .then(function() {
      showLoading('ACCOUNT CREATED — LOADING HUB...');
      setTimeout(function() { window.location.href = './index.html'; }, 600);
    })
    .catch(function(err) {
      hideLoading();
      document.getElementById('btnSignup').disabled = false;
      var msg = 'Sign up failed.';
      if (err.code === 'auth/email-already-in-use') msg = 'This email is already registered. Try logging in.';
      else if (err.code === 'auth/weak-password') msg = 'Password is too weak. Use at least 6 characters.';
      else if (err.code === 'auth/invalid-email') msg = 'Invalid email address.';
      showMsg(msg, 'error');
    });
}

// ══ Google Sign-In ══
function handleGoogle() {
  var provider = new firebase.auth.GoogleAuthProvider();
  showLoading('CONNECTING TO GOOGLE...');

  auth.signInWithPopup(provider)
    .then(function(result) {
      showLoading('ACCESS GRANTED — LOADING HUB...');
      setTimeout(function() { window.location.href = './index.html'; }, 600);
    })
    .catch(function(err) {
      hideLoading();
      if (err.code === 'auth/popup-closed-by-user') return;
      showMsg('Google sign-in failed. Try again.', 'error');
    });
}

// ══ Password Reset ══
function resetPassword() {
  var email = document.getElementById('loginEmail').value.trim();
  if (!email) { showMsg('Enter your email above first, then click Forgot Password.', 'info'); return; }
  auth.sendPasswordResetEmail(email)
    .then(function() { showMsg('Password reset email sent. Check your inbox.', 'success'); })
    .catch(function(err) {
      if (err.code === 'auth/user-not-found') showMsg('No account found with that email.', 'error');
      else showMsg('Could not send reset email. Try again.', 'error');
    });
}

// ══ Enter key support ══
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  if (document.getElementById('formLogin').style.display !== 'none') handleLogin();
  else handleSignup();
});
</script>
</body>
</html>
