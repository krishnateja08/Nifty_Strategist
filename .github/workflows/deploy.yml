# ═══════════════════════════════════════════════════════
#  Krishna Markets Intelligence Hub
#  GitHub Actions: Fetch market data + Deploy to GitHub Pages
#
#  Job 1 (fetch-data): Runs every 59 min via cron
#                      Uses Python + yfinance to write data.json
#  Job 2 (deploy):     Injects secrets + Deploys static site to GitHub Pages
# ═══════════════════════════════════════════════════════
name: Krishna Markets Hub

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '*/59 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:

  # ── Job 1: Fetch market data with Python ──────────────
  fetch-data:
    name: Fetch Market Data
    runs-on: ubuntu-latest
    concurrency:
      group: fetch-data
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance

      - name: Fetch market data
        run: python fetch_market_data.py

      - name: Commit data.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update market data [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job 2: Deploy to GitHub Pages ─────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: fetch-data
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main   # ensure we get the latest data.json

      # ── Inject secrets into HTML files ──
      - name: Inject API keys & secrets
        run: |
          echo "Injecting secrets into HTML files..."

          # List of files to process
          for file in index.html login.html; do
            sed -i "s|%%FIREBASE_API_KEY%%|${{ secrets.FIREBASE_API_KEY }}|g" "$file"
            sed -i "s|%%FIREBASE_AUTH_DOMAIN%%|${{ secrets.FIREBASE_AUTH_DOMAIN }}|g" "$file"
            sed -i "s|%%FIREBASE_PROJECT_ID%%|${{ secrets.FIREBASE_PROJECT_ID }}|g" "$file"
            sed -i "s|%%FIREBASE_STORAGE_BUCKET%%|${{ secrets.FIREBASE_STORAGE_BUCKET }}|g" "$file"
            sed -i "s|%%FIREBASE_MESSAGING_SENDER_ID%%|${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}|g" "$file"
            sed -i "s|%%FIREBASE_APP_ID%%|${{ secrets.FIREBASE_APP_ID }}|g" "$file"
          done

          # Finnhub key only in index.html
          sed -i "s|%%FINNHUB_API_KEY%%|${{ secrets.FINNHUB_KEY }}|g" index.html

          echo "Secrets injected successfully."

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
